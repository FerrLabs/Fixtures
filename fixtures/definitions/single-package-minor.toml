[meta]
name = "single-package-minor"
description = "Single package with a feat commit triggers minor bump"

[config]
content = '''
{
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "1.0.0"
tag = "v1.0.0"

[[commits]]
message = "feat: add user authentication"
files = ["src/auth.rs"]

[expect]
check_contains = ["myapp", "1.0.0", "1.1.0", "minor"]
check_not_contains = ["Nothing to release"]
