[meta]
name = "config-toml-format"
description = "FerrFlow config written as .ferrflow.toml instead of ferrflow.json"

[config]
format = "toml"
filename = ".ferrflow.toml"
content = '''
[workspace]

[[package]]
name = "mylib"
path = "."

[[package.versioned_files]]
path = "version.toml"
format = "toml"
'''

[[packages]]
name = "mylib"
path = "."
initial_version = "1.0.0"
tag = "v1.0.0"

[[commits]]
message = "feat: add something"
files = ["src/lib.rs"]

[expect]
check_contains = ["mylib", "1.1.0"]
check_not_contains = ["Nothing to release"]
