[meta]
name = "monorepo-mixed-bumps"
description = "Breaking change in history causes major bump for all touched packages"

[config]
content = '''
{
  "package": [
    {
      "name": "core",
      "path": "core",
      "versioned_files": [{"path": "core/version.toml", "format": "toml"}]
    },
    {
      "name": "cli",
      "path": "cli",
      "versioned_files": [{"path": "cli/version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "core"
path = "core"
initial_version = "1.0.0"
tag = "core@v1.0.0"

[[packages]]
name = "cli"
path = "cli"
initial_version = "1.0.0"
tag = "cli@v1.0.0"

[[commits]]
message = "feat!: redesign core API"
files = ["core/src/api.rs"]

[[commits]]
message = "fix(cli): update for new core API"
files = ["cli/src/main.rs", "core/src/compat.rs"]

[expect]
# Both packages see all commits since their tags. feat! = major for both.
check_contains = ["core", "2.0.0", "major", "cli", "2.0.0"]
packages_released = 2
