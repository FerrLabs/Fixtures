name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: generator/target
          key: generator-${{ runner.os }}-${{ hashFiles('generator/Cargo.lock', 'generator/Cargo.toml', 'generator/src/**') }}

      - name: Build generator
        working-directory: generator
        run: cargo build --release

      - name: Generate bundled fixtures (default args)
        run: ./generator/target/release/generate-fixtures

      - name: Generate to custom output (--definitions / --output)
        run: |
          ./generator/target/release/generate-fixtures \
            --definitions fixtures/definitions \
            --output /tmp/custom-output
          test -d /tmp/custom-output
          echo "Custom output generated successfully"
