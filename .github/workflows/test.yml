name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: generator/target
          key: generator-${{ runner.os }}-${{ hashFiles('generator/Cargo.lock', 'generator/Cargo.toml', 'generator/src/**') }}

      - name: Check formatting
        working-directory: generator
        run: cargo fmt --check

      - name: Clippy
        working-directory: generator
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: generator
        run: cargo test

      - name: Build generator
        working-directory: generator
        run: cargo build --release

      - name: Generate example fixtures
        run: |
          ./generator/target/release/generate-fixtures \
            --definitions fixtures/examples \
            --output /tmp/generated
          count=$(find /tmp/generated -mindepth 1 -maxdepth 1 -type d | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "Error: no fixtures were generated"
            exit 1
          fi
          echo "$count fixture(s) generated successfully"
