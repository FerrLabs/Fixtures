name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: generator/target
          key: generator-${{ runner.os }}-${{ hashFiles('generator/Cargo.lock', 'generator/Cargo.toml', 'generator/src/**') }}

      - name: Build generator
        working-directory: generator
        run: cargo build --release

      - name: Generate example fixtures
        run: |
          ./generator/target/release/generate-fixtures \
            --definitions fixtures/examples \
            --output /tmp/generated
          test -d /tmp/generated
          echo "Example fixtures generated successfully"
