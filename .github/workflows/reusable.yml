name: Reusable Integration Tests

on:
  workflow_call:
    inputs:
      ferrflow_ref:
        description: "FerrFlow ref to test against"
        required: true
        type: string

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test fixtures
        uses: actions/checkout@v4
        with:
          repository: FerrFlow-Org/Fixtures
          path: tests

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache generator build
        uses: actions/cache@v4
        with:
          path: tests/generator/target
          key: generator-${{ runner.os }}-${{ hashFiles('tests/generator/Cargo.lock', 'tests/generator/Cargo.toml') }}

      - name: Build fixture generator
        working-directory: tests/generator
        run: cargo build --release

      - name: Generate fixtures
        working-directory: tests
        run: ./generator/target/release/generate-fixtures

      - name: Checkout FerrFlow
        uses: actions/checkout@v4
        with:
          repository: FerrFlow-Org/FerrFlow
          ref: ${{ inputs.ferrflow_ref }}
          path: ferrflow

      - name: Build FerrFlow
        working-directory: ferrflow
        run: cargo build --release

      - name: Run integration tests
        working-directory: tests
        env:
          FERRFLOW_BIN: ${{ github.workspace }}/ferrflow/target/release/ferrflow
        run: ./scripts/run-tests.sh
