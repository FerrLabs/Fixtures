name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tag, no release)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: FerrLabs/.github/.github/workflows/reusable-ferrflow-release.yml@main
    with:
      dry-run: ${{ inputs.dry_run || false }}
    secrets: inherit
